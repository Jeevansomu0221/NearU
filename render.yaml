services:
  - type: web
    name: vyaha-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: OTP_PROVIDER
        value: 2factor
      - key: OTP_FIREBASE_FALLBACK
        value: "true"
      - key: OTP_DEBUG
        value: "true"
      - key: OTP_EXPIRY_MINUTES
        value: "10"
      - key: OTP_RESEND_COOLDOWN_SECONDS
        value: "30"
      - key: OTP_MAX_ATTEMPTS
        value: "5"
      - key: TWOFACTOR_API_KEY
        sync: false
      - key: TWOFACTOR_SENDER_ID
        value: VYAHA
      - key: TWOFACTOR_TEMPLATE_NAME
        value: Vyaha_OTP_Login
      - key: TWOFACTOR_DLT_ENTITY_ID
        value: "1201178135264753827"
      - key: FIREBASE_PROJECT_ID
        value: vyaha-a24a7
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_PANEL_PHONE
        sync: false
      - key: ADMIN_PANEL_PASSWORD
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_UPLOAD_FOLDER
        value: nearu-app
      - key: JWT_EXPIRY
        value: 15m
      - key: REFRESH_JWT_EXPIRY
        value: 7d
      - key: REQUEST_BODY_LIMIT
        value: 5mb
      - key: CORS_ORIGINS
        sync: false
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 300
