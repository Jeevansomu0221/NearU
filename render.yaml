services:
  - type: web
    name: vyaha-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: OTP_PROVIDER
        value: firebase
      - key: FIREBASE_PROJECT_ID
        value: vyaha-a24a7
      - key: JWT_EXPIRY
        value: 15m
      - key: REFRESH_JWT_EXPIRY
        value: 7d
      - key: REQUEST_BODY_LIMIT
        value: 5mb
      - key: CORS_ORIGINS
        value: "*"
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 300
