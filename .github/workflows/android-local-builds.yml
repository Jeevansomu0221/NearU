name: Android Local Builds

# Retrigger partner APK builds when we need a fresh run after runner/setup issues.

on:
  push:
    branches:
      - main
    paths:
      - apps/customer-app/**
      - apps/delivery-app/**
      - apps/partner-app/**
      - .github/workflows/android-local-builds.yml
  workflow_dispatch:
    inputs:
      app:
        description: App to build
        required: true
        default: customer
        type: choice
        options:
          - all
          - customer
          - delivery
          - partner
      artifact:
        description: Artifact type
        required: true
        default: all
        type: choice
        options:
          - all
          - both
          - development-apk
          - aab
          - apk

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: customer
            app_dir: apps/customer-app
            artifact_prefix: vyaha-customer
          - name: delivery
            app_dir: apps/delivery-app
            artifact_prefix: vyaha-delivery
          - name: partner
            app_dir: apps/partner-app
            artifact_prefix: vyaha-partner

    steps:
      - name: Checkout repository
        if: ${{ github.event_name == 'push' || github.event.inputs.app == 'all' || github.event.inputs.app == matrix.name }}
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: ${{ github.event_name == 'push' || github.event.inputs.app == 'all' || github.event.inputs.app == matrix.name }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.app_dir }}/package-lock.json

      - name: Set up Java
        if: ${{ github.event_name == 'push' || github.event.inputs.app == 'all' || github.event.inputs.app == matrix.name }}
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> "$GITHUB_ENV"
          java -version

      - name: Set up Android SDK
        if: ${{ github.event_name == 'push' || github.event.inputs.app == 'all' || github.event.inputs.app == matrix.name }}
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        if: ${{ github.event_name == 'push' || github.event.inputs.app == 'all' || github.event.inputs.app == matrix.name }}
        working-directory: ${{ matrix.app_dir }}
        run: npm ci

      - name: Build production AAB
        if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.app == 'all' || github.event.inputs.app == matrix.name) && (github.event.inputs.artifact == 'all' || github.event.inputs.artifact == 'both' || github.event.inputs.artifact == 'aab') }}
        working-directory: ${{ matrix.app_dir }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'https://vyaha-app-backend.onrender.com' }}
          EAS_LOCAL_BUILD_SKIP_CLEANUP: 1
        run: npx eas-cli build -p android --profile production --local --non-interactive --output ../../${{ matrix.artifact_prefix }}-production.aab

      - name: Build development APK
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.app == 'all' || github.event.inputs.app == matrix.name) && (github.event.inputs.artifact == 'all' || github.event.inputs.artifact == 'development-apk')) }}
        working-directory: ${{ matrix.app_dir }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'https://vyaha-app-backend.onrender.com' }}
          EAS_LOCAL_BUILD_SKIP_CLEANUP: 1
        run: npx eas-cli build -p android --profile development --local --non-interactive --output ../../${{ matrix.artifact_prefix }}-development.apk

      - name: Print development APK signing certificate
        if: ${{ github.event_name == 'push' || ((github.event.inputs.app == 'all' || github.event.inputs.app == matrix.name) && (github.event.inputs.artifact == 'all' || github.event.inputs.artifact == 'development-apk')) }}
        run: $ANDROID_HOME/build-tools/35.0.0/apksigner verify --print-certs ${{ matrix.artifact_prefix }}-development.apk

      - name: Build preview APK
        if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.app == 'all' || github.event.inputs.app == matrix.name) && (github.event.inputs.artifact == 'all' || github.event.inputs.artifact == 'both' || github.event.inputs.artifact == 'apk') }}
        working-directory: ${{ matrix.app_dir }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'https://vyaha-app-backend.onrender.com' }}
          EAS_LOCAL_BUILD_SKIP_CLEANUP: 1
        run: npx eas-cli build -p android --profile preview --local --non-interactive --output ../../${{ matrix.artifact_prefix }}-preview.apk

      - name: Upload AAB
        if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.app == 'all' || github.event.inputs.app == matrix.name) && (github.event.inputs.artifact == 'all' || github.event.inputs.artifact == 'both' || github.event.inputs.artifact == 'aab') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_prefix }}-production-aab
          path: ${{ matrix.artifact_prefix }}-production.aab
          if-no-files-found: error

      - name: Upload development APK
        if: ${{ github.event_name == 'push' || ((github.event.inputs.app == 'all' || github.event.inputs.app == matrix.name) && (github.event.inputs.artifact == 'all' || github.event.inputs.artifact == 'development-apk')) }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_prefix }}-development-apk
          path: ${{ matrix.artifact_prefix }}-development.apk
          if-no-files-found: error

      - name: Upload APK
        if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.app == 'all' || github.event.inputs.app == matrix.name) && (github.event.inputs.artifact == 'all' || github.event.inputs.artifact == 'both' || github.event.inputs.artifact == 'apk') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_prefix }}-preview-apk
          path: ${{ matrix.artifact_prefix }}-preview.apk
          if-no-files-found: error
