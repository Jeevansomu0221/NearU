name: Android Local Builds

# Retrigger partner APK builds when we need a fresh run after runner/setup issues.

on:
  push:
    branches:
      - main
    paths:
      - apps/customer-app/**
      - apps/delivery-app/**
      - apps/partner-app/**
      - .github/workflows/android-local-builds.yml
  workflow_dispatch:
    inputs:
      app:
        description: App to build
        required: true
        default: customer
        type: choice
        options:
          - all
          - customer
          - delivery
          - partner
      artifact:
        description: Artifact type
        required: true
        default: all
        type: choice
        options:
          - all
          - both
          - development-apk
          - aab
          - apk

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: customer
            app_dir: apps/customer-app
            artifact_prefix: vyaha-customer
          - name: delivery
            app_dir: apps/delivery-app
            artifact_prefix: vyaha-delivery
          - name: partner
            app_dir: apps/partner-app
            artifact_prefix: vyaha-partner

    steps:
      - name: Checkout repository
        if: ${{ github.event_name == 'push' || github.event.inputs.app == 'all' || github.event.inputs.app == matrix.name }}
        uses: actions/checkout@v5

      - name: Set up Node.js
        if: ${{ github.event_name == 'push' || github.event.inputs.app == 'all' || github.event.inputs.app == matrix.name }}
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ${{ matrix.app_dir }}/package-lock.json

      - name: Set up Java
        if: ${{ github.event_name == 'push' || github.event.inputs.app == 'all' || github.event.inputs.app == matrix.name }}
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> "$GITHUB_ENV"
          java -version

      - name: Set up Android SDK
        if: ${{ github.event_name == 'push' || github.event.inputs.app == 'all' || github.event.inputs.app == matrix.name }}
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        if: ${{ github.event_name == 'push' || github.event.inputs.app == 'all' || github.event.inputs.app == matrix.name }}
        working-directory: ${{ matrix.app_dir }}
        run: npm ci

      - name: Cache Gradle
        if: ${{ github.event_name == 'push' || github.event.inputs.app == 'all' || github.event.inputs.app == matrix.name }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-8.14.3-${{ matrix.name }}
          restore-keys: |
            ${{ runner.os }}-gradle-8.14.3-
            ${{ runner.os }}-gradle-

      - name: Warm Gradle wrapper
        if: ${{ github.event_name == 'push' || github.event.inputs.app == 'all' || github.event.inputs.app == matrix.name }}
        working-directory: ${{ matrix.app_dir }}
        run: |
          npx expo prebuild --platform android --no-install
          cd android
          for attempt in 1 2 3 4 5; do
            if ./gradlew --version; then
              echo "Gradle wrapper ready on attempt $attempt"
              exit 0
            fi
            echo "Gradle download attempt $attempt failed, retrying..."
            sleep $((attempt * 15))
          done
          echo "Error: could not download Gradle after 5 attempts"
          exit 1

      - name: Build production AAB
        if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.app == 'all' || github.event.inputs.app == matrix.name) && (github.event.inputs.artifact == 'all' || github.event.inputs.artifact == 'both' || github.event.inputs.artifact == 'aab') }}
        working-directory: ${{ matrix.app_dir }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'https://vyaha-app-backend.onrender.com' }}
          EAS_LOCAL_BUILD_SKIP_CLEANUP: 1
        run: |
          for attempt in 1 2 3; do
            if npx eas-cli build -p android --profile production --local --non-interactive --output ../../${{ matrix.artifact_prefix }}-production.aab; then
              exit 0
            fi
            echo "Production AAB build attempt $attempt failed, retrying..."
            sleep $((attempt * 30))
          done
          exit 1

      - name: Verify and stage production AAB
        if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.app == 'all' || github.event.inputs.app == matrix.name) && (github.event.inputs.artifact == 'all' || github.event.inputs.artifact == 'both' || github.event.inputs.artifact == 'aab') }}
        run: |
          AAB_OUT="${{ matrix.artifact_prefix }}-production.aab"
          AAB_SRC="${{ matrix.app_dir }}/android/app/build/outputs/bundle/release/app-release.aab"
          MAPPING_SRC="${{ matrix.app_dir }}/android/app/build/outputs/mapping/release/mapping.txt"
          MAPPING_OUT="${{ matrix.artifact_prefix }}-production-mapping.txt"

          if [ -f "$AAB_SRC" ]; then
            cp "$AAB_SRC" "$AAB_OUT"
          fi

          if [ -f "$MAPPING_SRC" ]; then
            cp "$MAPPING_SRC" "$MAPPING_OUT"
          fi

          if [ ! -f "$AAB_OUT" ]; then
            echo "Error: production AAB not found at $AAB_OUT"
            exit 1
          fi

          HEADER=$(xxd -p -l 2 "$AAB_OUT" | tr -d '\n')
          if [ "$HEADER" != "504b" ]; then
            echo "Error: $AAB_OUT is not a valid AAB (expected PK zip header, got $HEADER)"
            exit 1
          fi

          echo "Verified valid AAB: $AAB_OUT ($(du -h "$AAB_OUT" | cut -f1))"

      - name: Build development APK
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.app == 'all' || github.event.inputs.app == matrix.name) && (github.event.inputs.artifact == 'all' || github.event.inputs.artifact == 'development-apk')) }}
        working-directory: ${{ matrix.app_dir }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'https://vyaha-app-backend.onrender.com' }}
          EAS_LOCAL_BUILD_SKIP_CLEANUP: 1
        run: |
          for attempt in 1 2 3; do
            if npx eas-cli build -p android --profile development --local --non-interactive --output ../../${{ matrix.artifact_prefix }}-development.apk; then
              exit 0
            fi
            echo "Development APK build attempt $attempt failed, retrying..."
            sleep $((attempt * 30))
          done
          exit 1

      - name: Print development APK signing certificate
        if: ${{ github.event_name == 'push' || ((github.event.inputs.app == 'all' || github.event.inputs.app == matrix.name) && (github.event.inputs.artifact == 'all' || github.event.inputs.artifact == 'development-apk')) }}
        run: $ANDROID_HOME/build-tools/35.0.0/apksigner verify --print-certs ${{ matrix.artifact_prefix }}-development.apk

      - name: Build preview APK
        if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.app == 'all' || github.event.inputs.app == matrix.name) && (github.event.inputs.artifact == 'all' || github.event.inputs.artifact == 'both' || github.event.inputs.artifact == 'apk') }}
        working-directory: ${{ matrix.app_dir }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'https://vyaha-app-backend.onrender.com' }}
          EAS_LOCAL_BUILD_SKIP_CLEANUP: 1
        run: |
          for attempt in 1 2 3; do
            if npx eas-cli build -p android --profile preview --local --non-interactive --output ../../${{ matrix.artifact_prefix }}-preview.apk; then
              exit 0
            fi
            echo "Preview APK build attempt $attempt failed, retrying..."
            sleep $((attempt * 30))
          done
          exit 1

      - name: Upload AAB
        if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.app == 'all' || github.event.inputs.app == matrix.name) && (github.event.inputs.artifact == 'all' || github.event.inputs.artifact == 'both' || github.event.inputs.artifact == 'aab') }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_prefix }}-production-aab
          path: ${{ matrix.artifact_prefix }}-production.aab
          if-no-files-found: error

      - name: Upload ProGuard mapping
        if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.app == 'all' || github.event.inputs.app == matrix.name) && (github.event.inputs.artifact == 'all' || github.event.inputs.artifact == 'both' || github.event.inputs.artifact == 'aab') }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_prefix }}-production-mapping
          path: ${{ matrix.artifact_prefix }}-production-mapping.txt
          if-no-files-found: warn

      - name: Upload development APK
        if: ${{ github.event_name == 'push' || ((github.event.inputs.app == 'all' || github.event.inputs.app == matrix.name) && (github.event.inputs.artifact == 'all' || github.event.inputs.artifact == 'development-apk')) }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_prefix }}-development-apk
          path: ${{ matrix.artifact_prefix }}-development.apk
          if-no-files-found: error

      - name: Upload APK
        if: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.app == 'all' || github.event.inputs.app == matrix.name) && (github.event.inputs.artifact == 'all' || github.event.inputs.artifact == 'both' || github.event.inputs.artifact == 'apk') }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_prefix }}-preview-apk
          path: ${{ matrix.artifact_prefix }}-preview.apk
          if-no-files-found: error
