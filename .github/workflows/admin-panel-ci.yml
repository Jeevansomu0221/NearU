name: Admin Panel CI

on:
  push:
    branches:
      - main
    paths:
      - apps/admin-panel/**
      - .github/workflows/admin-panel-ci.yml
  pull_request:
    paths:
      - apps/admin-panel/**
      - .github/workflows/admin-panel-ci.yml
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin-panel
    env:
      VITE_API_URL: ${{ vars.VITE_API_URL || 'https://vyaha-app-backend.onrender.com' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/admin-panel/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
